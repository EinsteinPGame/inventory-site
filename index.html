<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMZ Collectible — Inventory Search</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:#05051a;color:#e0e0e0;min-height:100vh}
  .header{background:#0a0a2a;border-bottom:1px solid #1a1a3a;padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .logo{font-size:1.4rem;font-weight:700;color:#7b68ee;white-space:nowrap}
  .logo span{color:#00d4ff}
  .header-sub{font-size:0.8rem;color:#666}
  .container{max-width:1200px;margin:0 auto;padding:20px}
  .search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .search-bar input{flex:1;min-width:200px;padding:12px 18px;background:#12122a;border:1px solid #2a2a4a;border-radius:10px;color:#e0e0e0;font-size:1rem;outline:none;transition:border-color 0.2s}
  .search-bar input:focus{border-color:#7b68ee}
  .search-bar input::placeholder{color:#555}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .filter-btn{padding:6px 14px;background:#12122a;border:1px solid #2a2a4a;border-radius:8px;color:#888;font-size:0.8rem;cursor:pointer;transition:all 0.15s;font-family:inherit}
  .filter-btn:hover{border-color:#7b68ee;color:#ccc}
  .filter-btn.active{background:#7b68ee22;border-color:#7b68ee;color:#7b68ee}
  .stats{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
  .stat{background:#12122a;border:1px solid #1a1a3a;border-radius:10px;padding:12px 18px;min-width:120px}
  .stat-val{font-size:1.3rem;font-weight:700;color:#7b68ee}
  .stat-label{font-size:0.75rem;color:#666;margin-top:2px}
  table{width:100%;border-collapse:collapse;font-size:0.85rem}
  thead{position:sticky;top:0;z-index:2}
  th{background:#0a0a2a;color:#7b68ee;padding:10px 12px;text-align:left;font-weight:600;border-bottom:2px solid #2a2a4a;cursor:pointer;user-select:none;white-space:nowrap}
  th:hover{color:#00d4ff}
  th .arrow{font-size:0.7rem;margin-left:4px;color:#555}
  th.sorted .arrow{color:#7b68ee}
  td{padding:8px 12px;border-bottom:1px solid #1a1a2a;vertical-align:top}
  tr:hover td{background:#12122a}
  .sheet-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:600}
  .sheet-tag.IN{background:#44bb4422;color:#44bb44}
  .sheet-tag.OUT{background:#ff445522;color:#ff4455}
  .sheet-tag.RAW{background:#ffcc0022;color:#ccaa00}
  .price{font-weight:600;color:#44cc88;white-space:nowrap}
  .name-cell{max-width:300px;font-weight:500}
  .pagination{display:flex;justify-content:center;gap:8px;margin-top:16px;flex-wrap:wrap}
  .page-btn{padding:6px 12px;background:#12122a;border:1px solid #2a2a4a;border-radius:6px;color:#888;cursor:pointer;font-size:0.85rem;font-family:inherit}
  .page-btn:hover{border-color:#7b68ee;color:#ccc}
  .page-btn.active{background:#7b68ee;color:#fff;border-color:#7b68ee}
  .page-btn:disabled{opacity:0.3;cursor:default}
  .no-results{text-align:center;padding:40px;color:#555;font-size:1.1rem}
  .highlight{background:#7b68ee33;border-radius:2px}
  @media(max-width:768px){
    .container{padding:12px}
    table{font-size:0.75rem}
    th,td{padding:6px 8px}
    .hide-mobile{display:none}
  }
</style>
</head>
<body>
<div class="header">
  <div class="logo">AMZ<span>Collectible</span></div>
  <div class="header-sub">Inventory Price Search</div>
  <div style="flex:1"></div>
  <div class="header-sub" id="last-update"></div>
</div>
<div class="container">
  <div class="search-bar">
    <input type="text" id="search" placeholder="Search item name, category, logistic ID..." autofocus>
    <select id="sort-select" style="padding:10px 12px;background:#12122a;border:1px solid #2a2a4a;border-radius:10px;color:#e0e0e0;font-size:0.85rem;font-family:inherit;outline:none;cursor:pointer;min-width:140px">
      <option value="n:1">Name A→Z</option>
      <option value="n:-1">Name Z→A</option>
      <option value="p:1">Price Low→High</option>
      <option value="p:-1">Price High→Low</option>
      <option value="t:1">Total Low→High</option>
      <option value="t:-1">Total High→Low</option>
      <option value="q:1">Qty Low→High</option>
      <option value="q:-1">Qty High→Low</option>
      <option value="d:-1">Date Newest</option>
      <option value="d:1">Date Oldest</option>
    </select>
  </div>
  <div class="filters" id="filters"></div>
  <div class="stats" id="stats"></div>
  <div id="table-wrap">
    <table>
      <thead>
        <tr id="thead-row"></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
let DATA=[];
let filtered=[];
let sortCol='n';
let sortDir=1;
let page=0;
const PAGE_SIZE=50;
let activeSheet='ALL';
let searchTimeout=null;

const COLS=[
  {key:'s',label:'Type',w:'60px'},
  {key:'id',label:'ID',w:'100px',cls:'hide-mobile'},
  {key:'n',label:'Item Name',w:'auto'},
  // Category and Language hidden per Ys request
  // {key:'c',label:'Category',w:'120px',cls:'hide-mobile'},
  // {key:'l',label:'Lang/Detail',w:'80px',cls:'hide-mobile'},
  {key:'q',label:'Qty',w:'50px'},
  {key:'u',label:'Unit',w:'80px',cls:'hide-mobile'},
  {key:'p',label:'Cost (SGD)',w:'100px'},
  {key:'t',label:'Total (SGD)',w:'110px',cls:'hide-mobile'},
  {key:'d',label:'Date',w:'90px',cls:'hide-mobile'},
];

async function init(){
  const resp=await fetch('data.json');
  DATA=await resp.json();
  document.getElementById('last-update').textContent=`${DATA.length} records loaded`;
  buildHeaders();
  buildFilters();
  applyFilters();
}

function buildHeaders(){
  const tr=document.getElementById('thead-row');
  tr.innerHTML='';
  COLS.forEach(col=>{
    const th=document.createElement('th');
    th.className=col.cls||'';
    th.innerHTML=`${col.label}<span class="arrow"></span>`;
    th.style.width=col.w;
    th.onclick=()=>{
      if(sortCol===col.key)sortDir*=-1;
      else{sortCol=col.key;sortDir=1}
      document.querySelectorAll('th').forEach(t=>t.classList.remove('sorted'));
      th.classList.add('sorted');
      th.querySelector('.arrow').textContent=sortDir>0?' ▲':' ▼';
      applyFilters();
    };
    tr.appendChild(th);
  });
}

function buildFilters(){
  const f=document.getElementById('filters');
  const sheets=['ALL','IN','RAW','OUT'];
  const labels={'ALL':'All','IN':'Barang Masuk','RAW':'RAW & PSA','OUT':'Barang Keluar'};
  sheets.forEach(s=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(s===activeSheet?' active':'');
    btn.textContent=labels[s]||s;
    btn.onclick=()=>{
      activeSheet=s;
      f.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      page=0;applyFilters();
    };
    f.appendChild(btn);
  });
}

function applyFilters(){
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  filtered=DATA.filter(item=>{
    if(activeSheet!=='ALL'&&item.s!==activeSheet)return false;
    if(!q)return true;
    const terms=q.split(/\s+/);
    return terms.every(term=>
      (item.n||'').toLowerCase().includes(term)||
      (item.c||'').toLowerCase().includes(term)||
      (item.id||'').toLowerCase().includes(term)||
      (item.l||'').toLowerCase().includes(term)||
      (item.u||'').toLowerCase().includes(term)
    );
  });
  // Sort
  filtered.sort((a,b)=>{
    let va=a[sortCol],vb=b[sortCol];
    if(va==null)va='';if(vb==null)vb='';
    if(typeof va==='number'&&typeof vb==='number')return(va-vb)*sortDir;
    return String(va).localeCompare(String(vb))*sortDir;
  });
  updateStats();
  renderTable();
  renderPagination();
}

function updateStats(){
  const s=document.getElementById('stats');
  const totalQty=filtered.reduce((a,x)=>a+(x.q||0),0);
  const uniqueNames=new Set(filtered.map(x=>x.n)).size;
  s.innerHTML=`
    <div class="stat"><div class="stat-val">${filtered.length}</div><div class="stat-label">Records</div></div>
    <div class="stat"><div class="stat-val">${uniqueNames}</div><div class="stat-label">Unique Items</div></div>
    <div class="stat"><div class="stat-val">${totalQty.toLocaleString()}</div><div class="stat-label">Total Qty</div></div>
  `;
}

function renderTable(){
  const tbody=document.getElementById('tbody');
  const start=page*PAGE_SIZE;
  const items=filtered.slice(start,start+PAGE_SIZE);
  const q=(document.getElementById('search').value||'').toLowerCase().trim();

  if(items.length===0){
    tbody.innerHTML=`<tr><td colspan="${COLS.length}" class="no-results">No items found</td></tr>`;
    return;
  }

  tbody.innerHTML=items.map(item=>{
    return `<tr>${COLS.map(col=>{
      let val=item[col.key];
      let cls=col.cls||'';
      if(col.key==='s'){
        return `<td class="${cls}"><span class="sheet-tag ${val}">${val}</span></td>`;
      }
      if(col.key==='p'||col.key==='t'){
        if(val!=null)return `<td class="${cls} price">$${Number(val).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</td>`;
        return `<td class="${cls}">-</td>`;
      }
      if(col.key==='n'){
        let display=esc(val||'');
        if(q)display=highlightMatch(display,q);
        return `<td class="${cls} name-cell">${display}</td>`;
      }
      return `<td class="${cls}">${esc(val!=null?String(val):'')}</td>`;
    }).join('')}</tr>`;
  }).join('');
}

function renderPagination(){
  const div=document.getElementById('pagination');
  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  if(totalPages<=1){div.innerHTML='';return}
  let html='';
  html+=`<button class="page-btn" onclick="goPage(0)" ${page===0?'disabled':''}>First</button>`;
  html+=`<button class="page-btn" onclick="goPage(${page-1})" ${page===0?'disabled':''}>Prev</button>`;

  const range=3;
  let start=Math.max(0,page-range);
  let end=Math.min(totalPages-1,page+range);
  for(let i=start;i<=end;i++){
    html+=`<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i+1}</button>`;
  }

  html+=`<button class="page-btn" onclick="goPage(${page+1})" ${page>=totalPages-1?'disabled':''}>Next</button>`;
  html+=`<button class="page-btn" onclick="goPage(${totalPages-1})" ${page>=totalPages-1?'disabled':''}>Last</button>`;
  div.innerHTML=html;
}

function goPage(p){
  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  page=Math.max(0,Math.min(totalPages-1,p));
  renderTable();renderPagination();
  window.scrollTo(0,0);
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function highlightMatch(text,query){
  const terms=query.split(/\s+/).filter(t=>t.length>0);
  let result=text;
  terms.forEach(term=>{
    const re=new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
    result=result.replace(re,'<span class="highlight">$1</span>');
  });
  return result;
}

document.getElementById('search').addEventListener('input',function(){
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(()=>{page=0;applyFilters()},150);
});

document.getElementById('sort-select').addEventListener('change',function(){
  const [col,dir]=this.value.split(':');
  sortCol=col;sortDir=parseInt(dir);
  page=0;applyFilters();
});

document.addEventListener('keydown',function(e){
  if(e.key==='/'&&document.activeElement!==document.getElementById('search')){
    e.preventDefault();document.getElementById('search').focus();
  }
});

init();
</script>
</body>
</html>
